<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Hub Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        /* Dashboard Styles */
        .dashboard-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        /* Back Button Style */
        #back-nav {
            display: none;
            position: sticky;
            top: 0;
            z-index: 9999;
            background: rgba(2, 6, 23, 0.8);
            backdrop-blur: 10px;
            border-bottom: 1px solid #1e293b;
            padding: 10px 20px;
        }

        /* Ensure all links in course content open in new tab */
        #course-content a {
            target: _blank;
        }
    </style>
</head>
<body>
    <div class="dashboard-bg"></div>

    <nav id="back-nav">
        <button onclick="showDashboard()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-indigo-600 text-white rounded-lg transition-all font-bold text-sm">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
        </button>
    </nav>

    <div id="dashboard-view" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black text-white mb-4 tracking-tighter">MY COURSES</h1>
            <p class="text-slate-400 text-lg">Select a module to start learning</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
            <div onclick="loadCourse('ict')" class="glass-card rounded-3xl p-8 cursor-pointer group text-center">
                <div class="w-20 h-20 bg-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="monitor" class="w-10 h-10 text-indigo-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">ICT Batch Decoder</h2>
                <p class="text-slate-400 text-sm">HSC 2027 Special</p>
            </div>

            <div onclick="loadCourse('bangla')" class="glass-card rounded-3xl p-8 cursor-pointer group text-center">
                <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="book-open" class="w-10 h-10 text-blue-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">বাংলাবাজ ৭.০</h2>
                <p class="text-slate-400 text-sm">Bangla Comprehensive</p>
            </div>

            <div onclick="loadCourse('english')" class="glass-card rounded-3xl p-8 cursor-pointer group text-center">
                <div class="w-20 h-20 bg-purple-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="languages" class="w-10 h-10 text-purple-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">English Winner 5.0</h2>
                <p class="text-slate-400 text-sm">Grammar & Literature</p>
            </div>
        </div>
    </div>

    <div id="course-content"></div>

    <script>
        // Store your original files as strings (Simplified for execution)
        const courseData = {
            ict: ``,
            bangla: ``,
            english: ``
        };

        function loadCourse(id) {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('back-nav').style.display = 'block';
            
            // In a real scenario, we load the specific course HTML. 
            // Here we use an iframe or innerHTML injection.
            const container = document.getElementById('course-content');
            
            // To keep your visuals exactly as they were, we use an iframe
            // This prevents CSS from the dashboard leaking into your course pages.
            let fileName = "";
            if(id === 'ict') fileName = "ICT Batch Decoder 27.html";
            if(id === 'bangla') fileName = "বাংলাবাজ ৭.০.html";
            if(id === 'english') fileName = "Eng Winner 5.0.html";

            container.innerHTML = `<iframe src="${fileName}" style="width:100%; height:100vh; border:none;"></iframe>`;
            
            // Force all links inside the iframe to open in a new tab via a small hack 
            // Note: This works only if files are on the same domain
            const frame = container.querySelector('iframe');
            frame.onload = function() {
                const links = frame.contentDocument.getElementsByTagName('a');
                for(let link of links) {
                    link.setAttribute('target', '_blank');
                }
            };
        }

        function showDashboard() {
            document.getElementById('dashboard-view').style.display = 'flex';
            document.getElementById('back-nav').style.display = 'none';
            document.getElementById('course-content').innerHTML = '';
        }

        lucide.createIcons();
    </script>
</body>
</html>

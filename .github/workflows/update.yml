name: Auto-Update M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'TV/base.m3u'

# THIS IS THE FIX FOR EXIT CODE 128
permissions:
  contents: write 

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js warning
      - name: Checkout repository
        uses: actions/checkout@v4 

      # Updated to v5 to fix the Node.js warning
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update_playlist.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add TV/new.m3u
          git commit -m "Auto-update TV/new.m3u playlist" || exit 0
          git push

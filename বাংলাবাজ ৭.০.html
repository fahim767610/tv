            { title: "ভাষণ, বৈদ্যুতিক চিঠি, খুদে বার্তা, পত্র লিখন", url: "https://www.youtube.com/watch?v=bakhRjJKR6U", pdfUrl: "https://pdf.bondipathshala.education/1759833890338.pdf", categories: ["নির্মিতি"] },
            { title: "নির্মিতি ফাইনাল সাজেশন ", url: "https://www.youtube.com/watch?v=XHjNW8Z2ULo", pdfUrl: "https://pdf.bondipathshala.education/1760204415523.pdf", categories: ["নির্মিতি"] }
        ];

        const TARGET_CATEGORIES = ['All', 'কবিতা', 'গদ্য', 'সহপাঠ', 'ব্যাকরণ', 'নির্মিতি', 'Solve Class'];

        function App() {
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [showScrollTop, setShowScrollTop] = useState(false);
            const [showArchive, setShowArchive] = useState(false);

            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 400);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            const activeLinks = showArchive ? ARCHIVE_LINKS : LINKS;

            const filteredLinks = useMemo(() => {
                const query = (searchQuery || '').toLowerCase().trim();
                
                return activeLinks.filter(link => {
                    const safeTitle = link.title ? link.title.toLowerCase() : '';
                    const safeKeywords = link.keywords ? link.keywords.toLowerCase() : '';
                    
                    const matchesSearch = query === '' || safeTitle.includes(query) || safeKeywords.includes(query);
                    
                    const matchesCategory = selectedCategory === 'All' || 
                        (Array.isArray(link.categories) && link.categories.some(c => c && c.trim() === selectedCategory.trim()));
                        
                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, selectedCategory, showArchive]);

            const getCategoryIcon = (category) => {
                switch (category) {
                    case 'কবিতা': return html`<${PlayCircle} className="w-4 h-4" />`;
                    case 'ব্যাকরণ': return html`<${BookOpen} className="w-4 h-4" />`;
                    case 'গদ্য': return html`<${Video} className="w-4 h-4" />`;
                    case 'সহপাঠ': return html`<${Layers} className="w-4 h-4" />`;
                    case 'নির্মিতি': return html`<${GraduationCap} className="w-4 h-4" />`;
                    case 'Solve Class': return html`<${ClipboardCheck} className="w-4 h-4" />`;
                    default: return html`<${Video} className="w-4 h-4" />`;
                }
            };

            return html`
                <div className="min-h-screen text-slate-100 font-sans">
                    <header className="sticky top-0 z-50 bg-[#020617]/60 backdrop-blur-xl border-b border-slate-800/50">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <div className=${`p-1.5 rounded-lg shadow-lg ${!showArchive ? 'bg-blue-600 shadow-blue-500/20' : 'bg-purple-600 shadow-purple-500/20'}`}>
                                        ${!showArchive 
                                            ? html`<${BookOpen} className="w-5 h-5 text-white" />` 
                                            : html`<${Archive} className="w-5 h-5 text-white" />`}
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-extrabold tracking-tight text-white leading-none flex items-center gap-2">
                                            ${!showArchive ? 'বাংলাবাজ ৭.০' : 'বাংলাবাজ ৬.০'}
                                            ${showArchive && html`<span className="text-[10px] bg-purple-500/20 text-purple-400 px-1.5 py-0.5 rounded border border-purple-500/30 uppercase tracking-widest ml-1 font-bold">Archive</span>`}
                                        </h1>
                                        <div className="flex items-center gap-2 mt-1">
                                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Repository</p>
                                            <span className="w-1 h-1 rounded-full bg-slate-700"></span>
                                            <p className=${`text-[10px] font-bold uppercase tracking-widest ${!showArchive ? 'text-blue-500/80' : 'text-purple-500/80'}`}>${activeLinks.length} Lectures</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex items-center gap-3 w-full sm:w-auto">
                                    <div className="relative group flex-1 sm:w-64">
                                        <${Search} className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500 group-focus-within:text-blue-400 transition-colors" />
                                        <input
                                            type="text"
                                            aria-label="Search classes"
                                            placeholder="Search classes..."
                                            className="w-full pl-9 pr-4 py-2 bg-slate-900/50 border border-slate-800 focus:bg-slate-900 focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/5 rounded-xl transition-all outline-none text-xs text-white placeholder:text-slate-600"
                                            value=${searchQuery}
                                            onInput=${(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>
                                    <button
                                        onClick=${() => { setShowArchive(!showArchive); setSelectedCategory('All'); scrollToTop(); }}
                                        className=${`flex items-center justify-center gap-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all border ${!showArchive ? 'bg-slate-800/40 border-slate-700 text-slate-300 hover:bg-slate-800 hover:text-white' : 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500'}`}
                                    >
                                        ${!showArchive 
                                            ? html`<${Archive} className="w-3.5 h-3.5" /> <span>Go to Archive</span>` 
                                            : html`<${ArrowLeft} className="w-3.5 h-3.5" /> <span>Back to Main Course</span>`}
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mt-4">
                                <div className="flex items-center gap-2 overflow-x-auto pb-1 no-scrollbar flex-1">
                                    ${TARGET_CATEGORIES.map((cat) => html`
                                        <button
                                            key=${cat}
                                            onClick=${() => setSelectedCategory(cat)}
                                            className=${`px-4 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap transition-all duration-300 relative overflow-hidden ${selectedCategory === cat ? (!showArchive ? "bg-blue-600 text-white shadow-lg shadow-blue-600/20 scale-105" : "bg-purple-600 text-white shadow-lg shadow-purple-600/20 scale-105") : "bg-slate-900/50 text-slate-500 border border-slate-800/50 hover:border-slate-700 hover:text-slate-300"}`}
                                        >
                                            ${selectedCategory === cat && html`
                                                <${motion.div}
                                                    layoutId="active-cat-glow"
                                                    className="absolute inset-0 bg-white/20 animate-pulse"
                                                />
                                            `}
                                            <span className="relative z-10">${cat}</span>
                                        </button>
                                    `)}
                                </div>
                                <div className="flex items-center gap-3 sm:pl-4 sm:border-l border-slate-800 overflow-x-auto pb-1 no-scrollbar">
                                    ${!showArchive && html`
                                        <a 
                                            href="https://drive.google.com/drive/folders/1w6n7TYm4S_pYi-KAlnh94WuC9ZDaNCkl?usp=drive_link" 
                                            target="_blank" 
                                            className="flex items-center gap-2 px-4 py-1.5 rounded-lg border border-blue-500/30 bg-slate-900 text-blue-400 hover:bg-blue-500/10 transition-colors text-xs font-bold whitespace-nowrap"
                                        >
                                            <${BookOpen} className="w-3.5 h-3.5" />
                                            Banglabazz 7.0 PDF
                                        </a>
                                    `}
                                    ${showArchive && html`
                                        <a 
                                            href="https://drive.google.com/drive/folders/1LYmjl2Cfh2mA4rFJomlR_o67-oW3B30q?usp=drive_link" 
                                            target="_blank" 
                                            className="flex items-center gap-2 px-4 py-1.5 rounded-lg border border-purple-500/30 bg-slate-900 text-purple-400 hover:bg-purple-500/10 transition-colors text-xs font-bold whitespace-nowrap"
                                        >
                                            <${FileText} className="w-3.5 h-3.5" />
                                            Banglabazz 6.0 PDF
                                        </a>
                                    `}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            <${AnimatePresence} mode="popLayout">
                                ${filteredLinks.map((link, index) => html`
                                    <${motion.div}
                                        layout
                                        initial=${{ opacity: 0, y: 20 }}
                                        animate=${{ opacity: 1, y: 0 }}
                                        exit=${{ opacity: 0, scale: 0.95 }}
                                        transition=${{ 
                                            duration: 0.4, 
                                            delay: index * 0.02,
                                            ease: [0.23, 1, 0.32, 1]
                                        }}
                                        key=${link.title + index}
                                        onClick=${() => window.location.href = link.url}
                                        className="group relative glass glass-hover rounded-2xl p-5 cursor-pointer flex flex-col justify-between overflow-hidden"
                                    >
                                        <div className=${`absolute inset-0 bg-gradient-to-br from-transparent via-transparent transition-all duration-700 ${!showArchive ? 'group-hover:from-blue-600/5 group-hover:to-cyan-600/5 to-cyan-600/0' : 'group-hover:from-purple-600/5 group-hover:to-pink-600/5 to-pink-600/0'}`} />
                                        
                                        <div className="relative z-10">
                                            <div className="flex items-center justify-between mb-4">
                                                <div className="flex flex-wrap gap-1.5">
                                                    ${link.categories && link.categories.map(cat => html`
                                                        <span key=${cat} className=${`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-tighter border ${!showArchive ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'bg-purple-500/10 text-purple-400 border-purple-500/20'}`}>
                                                            ${getCategoryIcon(cat)}
                                                            ${cat}
                                                        </span>
                                                    `)}
                                                </div>
                                                <div className=${`p-1.5 rounded-lg bg-slate-800/50 group-hover:rotate-12 transition-all duration-300 ${!showArchive ? 'group-hover:bg-blue-600' : 'group-hover:bg-purple-600'}`}>
                                                    <${ExternalLink} className="w-3 h-3 text-slate-500 group-hover:text-white transition-colors" />
                                                </div>
                                            </div>
                                            <h3 className="text-sm font-bold text-slate-200 leading-snug group-hover:text-white transition-colors line-clamp-2">
                                                ${link.title}
                                            </h3>
                                        </div>
                                        
                                        <div className="relative z-10 mt-5 pt-4 border-t border-slate-800/50 flex flex-wrap items-center justify-between text-[10px] font-bold uppercase tracking-wider text-slate-500">
                                            <div className="flex flex-wrap items-center gap-2">
                                                <span className=${`flex items-center gap-1.5 transition-colors mr-2 ${!showArchive ? 'group-hover:text-blue-400' : 'group-hover:text-purple-400'}`}>
                                                    <div className="relative flex h-2 w-2">
                                                        <div className=${`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${!showArchive ? 'bg-blue-400' : 'bg-purple-400'}`}></div>
                                                        <div className=${`relative inline-flex rounded-full h-2 w-2 ${!showArchive ? 'bg-blue-500' : 'bg-purple-500'}`}></div>
                                                    </div>
                                                    Lecture
                                                </span>
                                                ${link.pdfUrl && html`
                                                    <a 
                                                        href=${link.pdfUrl} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        onClick=${(e) => e.stopPropagation()}
                                                        className="flex items-center gap-1.5 px-2 py-1 rounded-md bg-red-500/5 border border-red-500/20 text-red-500/70 hover:text-red-400 hover:bg-red-500/10 hover:border-red-500/40 transition-all duration-300"
                                                    >
                                                        <${FileText} className="w-3 h-3" />
                                                        PDF
                                                    </a>
                                                `}
                                                ${link.practiceUrl && html`
                                                    <a 
                                                        href=${link.practiceUrl} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        onClick=${(e) => e.stopPropagation()}
                                                        className="flex items-center gap-1.5 px-2 py-1 rounded-md bg-emerald-500/5 border border-emerald-500/20 text-emerald-500/70 hover:text-emerald-400 hover:bg-emerald-500/10 hover:border-emerald-500/40 transition-all duration-300"
                                                    >
                                                        <${FileText} className="w-3 h-3" />
                                                        Practice
                                                    </a>
                                                `}
                                            </div>
                                            <span className=${`opacity-0 group-hover:opacity-100 translate-x-2 group-hover:translate-x-0 transition-all duration-300 ml-auto ${!showArchive ? 'text-blue-500' : 'text-purple-500'}`}>
                                                START →
                                            </span>
                                        </div>
                                    <//>
                                `)}
                            <//>
                        </div>

                        ${filteredLinks.length === 0 && html`
                            <div className="text-center py-32">
                                <div className="bg-slate-900 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-slate-800 shadow-inner">
                                    <${Search} className="w-10 h-10 text-slate-700" />
                                </div>
                                <h3 className="text-xl font-bold text-white">No lectures found</h3>
                                <p className="text-slate-500 mt-2">Try adjusting your search or category filter</p>
                            </div>
                        `}
                    </main>

                    <${AnimatePresence}>
                        ${showScrollTop && html`
                            <${motion.button}
                                initial=${{ opacity: 0, y: 20 }}
                                animate=${{ opacity: 1, y: 0 }}
                                exit=${{ opacity: 0, y: 20 }}
                                onClick=${scrollToTop}
                                className=${`fixed bottom-8 right-8 p-3 text-white rounded-full shadow-2xl transition-all z-50 group ${!showArchive ? 'bg-blue-600 shadow-blue-600/40 hover:bg-blue-500' : 'bg-purple-600 shadow-purple-600/40 hover:bg-purple-500'}`}
                            >
                                <${ChevronUp} className="w-6 h-6 group-hover:-translate-y-1 transition-transform" />
                            <//>
                        `}
                    <//>
                </div>
            `;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>

                const handleScroll = () => setShowScrollTop(window.scrollY > 400);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);

                    const safeKeywords = link.keywords ? link.keywords.toLowerCase() : '';
                    
                    const matchesSearch = query === '' || safeTitle.includes(query) || safeKeywords.includes(query);
                    
                    const matchesCategory = selectedCategory === 'All' || 
                        (Array.isArray(link.categories) && link.categories.some(c => c && c.trim() === selectedCategory.trim()));
                        
                    return matchesSearch && matchesCategory;
                });
            }, [searchQuery, selectedCategory, activeLinks]);

                    case '1st Paper': return html`<${BookOpen} className="w-4 h-4" />`;

                                initial=${{ opacity: 0, y: 20 }}
                                animate=${{ opacity: 1, y: 0 }}
                                exit=${{ opacity: 0, y: 20 }}
                                onClick=${scrollToTop}
                                className=${`fixed bottom-8 right-8 p-3 text-white rounded-full shadow-2xl transition-all z-50 group ${view === 'main' ? 'bg-blue-600 shadow-blue-600/40 hover:bg-blue-500' : 'bg-purple-600 shadow-purple-600/40 hover:bg-purple-500'}`}

                                <${ChevronUp} className="w-6 h-6 group-hover:-translate-y-1 transition-transform" />
                            <//>
                        `}
                    <//>
                </div>
            `;

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
